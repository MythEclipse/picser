services:
  picser:
    build:
      context: .
      dockerfile: Dockerfile
    image: picser:latest
    container_name: picser-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # GitHub config (Required)
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
